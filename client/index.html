<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdiMart</title>
    <style>
      /* Full screen glassmorphism overlay */
      #maintenance-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 999999;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #ffffff;
        padding: 20px;
        box-sizing: border-box;
      }

      /* Notice Card Container */
      .notice-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 40px 30px;
        text-align: center;
        max-width: 440px;
        width: 100%;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }

      /* Alert Pulse Icon */
      .alert-icon {
        background: rgba(239, 68, 68, 0.15);
        color: #ef4444;
        width: 64px;
        height: 64px;
        border-radius: 50%;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        font-size: 32px;
        font-weight: bold;
        margin-bottom: 24px;
      }

      h1 {
        font-size: 24px;
        margin: 0 0 12px 0;
        font-weight: 700;
        letter-spacing: -0.5px;
      }

      p {
        color: #94a3b8;
        font-size: 15px;
        line-height: 1.6;
        margin: 0 0 32px 0;
      }

      /* Pulsing target store button */
      .nbs-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: #ffffff;
        text-decoration: none;
        padding: 16px 32px;
        border-radius: 14px;
        font-weight: 600;
        font-size: 16px;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
        width: 100%;
        box-sizing: border-box;
      }

      .nbs-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(37, 99, 235, 0.6);
      }

      .nbs-button:active {
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <!-- Full-screen Notice & Route Interceptor -->
    <div id="maintenance-overlay">
      <div class="notice-card">
        <div class="alert-icon">⚠️</div>
        <h1>This Store is Temporarily Down</h1>
        <p>This page is currently not operational. To continue ordering items for instant delivery on campus, please switch over to our active outlet.</p>
        
        <a href="https://bhakhtawarmal.vercel.app" class="nbs-button">
          Go to NBS Store
        </a>
      </div>
    </div>

    <!-- React App Root elements stay completely hidden underneath -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
